function sopSelectProp(type){
  let h=`<div class="sh-head"><div class="sh-title">${type==='arrival'?'🏖️ Arrival Prep':'✈️ Departure'}</div><button class="sh-close" onclick="closeSheet()">✕</button></div><div style="padding:0 16px 12px;color:var(--text3);font-size:14px">Select the property:</div>`;
  db.properties.forEach(p=>{h+=`<div class="card" style="cursor:pointer" onclick="closeSheet();startSOP('${p.id}','${type}')"><div class="card-section"><div style="font-size:17px;font-weight:500">${esc(p.name)}</div>${p.address?`<div style="font-size:13px;color:var(--text3);margin-top:2px">${esc(p.address)}</div>`:''}</div></div>`;});
  openSheet(h);
}

function startSOP(pid,type){
  const p=db.properties.find(x=>x.id===pid);if(!p)return;
  const tmpl=type==='arrival'?SOP_ARRIVAL:SOP_DEPARTURE;
  sopData={id:uid(),propertyId:pid,type,date:today(),items:{},flags:[],photos:[]};
  tmpl.forEach(sec=>sec.items.forEach(item=>{sopData.items[item.id]={status:'ok',notes:''};} ));
  renderSOPStep(p,type,0);
}

function renderSOPStep(p,type,step){
  const tmpl=type==='arrival'?SOP_ARRIVAL:SOP_DEPARTURE;
  const totalSteps=tmpl.length+2; // sections + photos + review
  const pct=Math.round((step/totalSteps)*100);
  const stepLabels=[...tmpl.map(s=>s.label.replace(/^[^\s]+\s/,'').split(' ')[0]),'Photos','Review'];
  let content='';
  if(step<tmpl.length){
    const sec=tmpl[step];
    content=`<div style="padding:0 16px 10px"><div style="font-size:18px;font-weight:600">${sec.label}</div><div style="font-size:13px;color:var(--text3);margin-top:3px">Tap ✅ OK · ⚠️ Issue · 🚩 Flag</div></div><div style="padding:0 16px">`;
    sec.items.forEach(item=>{const cur=sopData.items[item.id]||{status:'ok',notes:''};content+=`<div class="ck-item"><div class="ck-info"><div class="ck-label">${esc(item.label)}</div><input placeholder="Notes (optional)" value="${esc(cur.notes||'')}" oninput="sopData.items['${item.id}'].notes=this.value"/></div><div class="ck-btns"><button class="ck-btn${cur.status==='ok'?' sel-ok':''}" onclick="setSOPStatus('${item.id}','ok',this)">✅</button><button class="ck-btn${cur.status==='issue'?' sel-issue':''}" onclick="setSOPStatus('${item.id}','issue',this)">⚠️</button><button class="ck-btn${cur.status==='flag'?' sel-flag':''}" onclick="setSOPStatus('${item.id}','flag',this)">🚩</button></div></div>`;});
    content+=`</div>`;
  }
  if(step===tmpl.length){
    content=`<div style="padding:0 16px 10px"><div style="font-size:18px;font-weight:600">📷 Photos</div><div style="font-size:13px;color:var(--text3);margin-top:3px">Document the property condition.</div></div>
    <div class="photo-grid" id="sop-active-photos">
      <div class="photo-add" onclick="pickActivePhoto('sop')"><span>📷</span><span>Add Photo</span></div>
    </div>`;
    if(sopData.photos&&sopData.photos.length>0){content+=`<script>setTimeout(()=>loadPhotosIntoGrid('sop-active-photos',${JSON.stringify(sopData.photos)},true),100);<\/script>`;}
  }
  if(step===totalSteps-1){
    const iss=Object.entries(sopData.items).filter(([k,v])=>v.status!=='ok');
    content=`<div style="padding:0 16px 10px"><div style="font-size:18px;font-weight:600">Review & Submit</div></div>
    <div class="card">
      <div class="card-row"><div class="crt"><h3>Property</h3></div><div class="crr" style="font-weight:500">${esc(p.name)}</div></div>
      <div class="card-row"><div class="crt"><h3>Type</h3></div><div class="crr">${type==='arrival'?'🏖️ Arrival Prep':'✈️ Departure'}</div></div>
      <div class="card-row"><div class="crt"><h3>Date</h3></div><div class="crr"><input type="date" id="sop-date" value="${sopData.date}" onchange="sopData.date=this.value" style="border:none;font-size:14px;color:var(--text);background:none;text-align:right;-webkit-appearance:none;"/></div></div>
      <div class="card-row"><div class="crt"><h3>Items Needing Attention</h3></div><div class="crr">${iss.length>0?`<span class="badge b-orange">${iss.length}</span>`:'<span class="badge b-green">None</span>'}</div></div>
      <div class="card-row"><div class="crt"><h3>Photos</h3></div><div class="crr">${sopData.photos&&sopData.photos.length>0?`<span class="badge b-teal">📷 ${sopData.photos.length}</span>`:'<span class="badge b-gray">None</span>'}</div></div>
    </div>
    <div class="sec-label" style="padding-top:8px">Flags / Issues (optional)</div>
    <div id="sop-fl-list">${sopData.flags.map((f,i)=>sopFlEntry(f,i)).join('')}</div>
    <div style="padding:4px 16px 8px"><button class="btn btn-secondary btn-block" onclick="addSOPFL()">+ Add Issue or Flag</button></div>`;
  }
  const h=`<div class="sh-head"><div class="sh-title">${type==='arrival'?'🏖️':'✈️'} ${esc(p.name)}</div><button class="sh-close" onclick="if(confirm('Cancel this SOP?'))closeSheet()">✕</button></div>
  <div class="prog-wrap">
    <div class="prog-steps">${stepLabels.map((s,i)=>`<span class="${i===step?'cur':''}">${s}</span>`).join('')}</div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-label"><span>${step<tmpl.length?tmpl[step].label:step===tmpl.length?'Photos':'Review & Submit'}</span><span>${step+1}/${totalSteps}</span></div>
  </div>
  <div style="height:10px"></div>
  <div id="sop-step">${content}</div>
  <div style="padding:16px 16px 8px;display:flex;gap:10px">
    ${step>0?`<button class="btn btn-secondary" style="flex:1" onclick="renderSOPStep(db.properties.find(x=>x.id==='${p.id}'),'${type}',${step-1})">← Back</button>`:''}
    ${step<totalSteps-1?`<button class="btn btn-primary" style="flex:2" onclick="renderSOPStep(db.properties.find(x=>x.id==='${p.id}'),'${type}',${step+1})">Continue →</button>`:`<button class="btn btn-green" style="flex:2" onclick="submitSOP()">✅ Submit SOP</button>`}
  </div>`;
  openSheet(h);
}

function setSOPStatus(itemId,status,btn){sopData.items[itemId].status=status;const row=btn.closest('.ck-btns');row.querySelectorAll('.ck-btn').forEach(b=>{b.className='ck-btn';});btn.classList.add(status==='ok'?'sel-ok':status==='issue'?'sel-issue':'sel-flag');}
function sopFlEntry(f,i){return`<div class="fl-card"><input class="fi" placeholder="Describe the issue *" value="${esc(f.description||'')}" oninput="sopData.flags[${i}].description=this.value"/><div class="pri-row"><button class="pri-btn${f.priority==='low'?' sel-low':''}" onclick="sopSetPri(${i},'low',this)">🟡 Low</button><button class="pri-btn${!f.priority||f.priority==='medium'?' sel-med':''}" onclick="sopSetPri(${i},'medium',this)">🟠 Med</button><button class="pri-btn${f.priority==='high'?' sel-high':''}" onclick="sopSetPri(${i},'high',this)">🔴 High</button></div></div>`;}
function sopSetPri(i,pri,btn){sopData.flags[i].priority=pri;const row=btn.closest('.pri-row');row.querySelectorAll('.pri-btn').forEach(b=>{b.className='pri-btn';});btn.classList.add(pri==='low'?'sel-low':pri==='medium'?'sel-med':'sel-high');}
function addSOPFL(){sopData.flags.push({description:'',priority:'medium'});document.getElementById('sop-fl-list').innerHTML=sopData.flags.map((f,i)=>sopFlEntry(f,i)).join('');}

function submitSOP(){
  if(!sopData)return;
  if(!db.sopRecords)db.sopRecords=[];
  db.sopRecords.push(sopData);save();
  const fl=sopData.flags.length,type=sopData.type;
  closeSheet();sopData=null;nav(curTab);
  setTimeout(()=>toast(fl>0?`⚠️ SOP saved · ${fl} issue${fl!==1?'s':''} flagged`:`✅ ${type==='arrival'?'Arrival prep':'Departure'} SOP saved!`),300);
}

function viewSOPRecord(id){
  if(!db.sopRecords)return;
  const r=db.sopRecords.find(x=>x.id===id);if(!r)return;
  const tmpl=r.type==='arrival'?SOP_ARRIVAL:SOP_DEPARTURE;
  const allItems=tmpl.flatMap(s=>s.items);
  const iss=Object.entries(r.items||{}).filter(([k,v])=>v.status!=='ok');
  let h=`<div class="sh-head"><div class="sh-title">${r.type==='arrival'?'🏖️ Arrival Prep':'✈️ Departure'}</div><button class="sh-close" onclick="closeSheet()">✕</button></div>
  <div style="padding:0 16px 8px;color:var(--text3);font-size:14px">${esc(propName(r.propertyId))} · 📅 ${fmtDate(r.date)}</div>
  <div class="sec-label">Summary</div><div class="card">
    <div class="card-row"><div class="crt"><h3>Items Checked</h3></div><div class="crr">${allItems.length}</div></div>
    <div class="card-row"><div class="crt"><h3>Items Needing Attention</h3></div><div class="crr">${iss.length>0?`<span class="badge b-orange">${iss.length}</span>`:'<span class="badge b-green">None</span>'}</div></div>
    <div class="card-row"><div class="crt"><h3>Flags</h3></div><div class="crr">${r.flags&&r.flags.length>0?`<span class="badge b-red">${r.flags.length}</span>`:'<span class="badge b-green">None</span>'}</div></div>
  </div>`;
  if(iss.length>0){
    h+=`<div class="sec-label">Items Needing Attention</div><div class="card">`;
    iss.forEach(([iid,item])=>{const t=allItems.find(x=>x.id===iid);h+=`<div class="card-row"><div class="crt"><h3>${item.status==='flag'?'🚩':'⚠️'} ${esc(t?t.label:iid)}</h3>${item.notes?`<p>${esc(item.notes)}</p>`:''}</div></div>`;});
    h+=`</div>`;
  }
  if(r.flags&&r.flags.length>0){
    h+=`<div class="sec-label">Flagged Issues</div><div class="card">`;
    r.flags.forEach(f=>{const c=f.priority==='high'?'var(--red)':f.priority==='low'?'var(--yellow)':'var(--orange)';h+=`<div class="card-row"><div style="width:4px;min-height:36px;background:${c};border-radius:2px;margin-right:12px;flex-shrink:0;align-self:stretch"></div><div class="crt"><h3>${esc(f.description)}</h3><p>${f.priority||'medium'} priority</p></div></div>`;});
    h+=`</div>`;
  }
  h+=`<div class="sec-label">Photos</div>
  <div class="photo-grid" id="sop-rec-photos-${id}">
    <div class="photo-add" onclick="pickRecordPhoto('sop','${id}')"><span>📷</span><span>Add Photo</span></div>
  </div>`;
  h+=`<div style="padding:8px 16px 20px"><button class="btn btn-red btn-block" onclick="deleteSOPRecord('${r.id}')">Delete This Record</button></div>`;
  openSheet(h);
  setTimeout(()=>loadPhotosIntoGrid('sop-rec-photos-'+id,r.photos||[],false),100);
}

function deleteSOPRecord(id){if(!confirm('Delete this SOP record?'))return;db.sopRecords=(db.sopRecords||[]).filter(x=>x.id!==id);save();closeSheet();nav(curTab);}


/* ═══════════════════════════════════════════════
   PHOTO UTILITIES
═══════════════════════════════════════════════ */
function pickActivePhoto(context){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    toast('Processing photo...');
    const dataUrl=await compressImage(file,1200,0.8);
    const photoId=uid();
    await storePhoto(photoId,dataUrl);
    if(context==='check'){if(ckData){if(!ckData.photos)ckData.photos=[];ckData.photos.push(photoId);}}
    else if(context==='sop'){if(sopData){if(!sopData.photos)sopData.photos=[];sopData.photos.push(photoId);}}
    // Add thumbnail to current grid
    const gridId=context==='check'?'active-photos':'sop-active-photos';
    const grid=document.getElementById(gridId);
    if(grid){
      const img=document.createElement('img');img.src=dataUrl;img.className='photo-thumb';img.onclick=()=>viewPhotoFull(dataUrl);
      grid.insertBefore(img,grid.firstChild);
    }
    toast('📷 Photo added!');
  };
  inp.click();
}

function pickRecordPhoto(context,contextId){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    toast('Processing photo...');
    const dataUrl=await compressImage(file,1200,0.8);
    const photoId=uid();
    await storePhoto(photoId,dataUrl);
    // Save to record
    if(context==='check'){const c=db.checks.find(x=>x.id===contextId);if(c){if(!c.photos)c.photos=[];c.photos.push(photoId);save();}}
    else if(context==='maint'){const m=db.maintenance.find(x=>x.id===contextId);if(m){if(!m.photos)m.photos=[];m.photos.push(photoId);save();}}
    else if(context==='sop'){const r=(db.sopRecords||[]).find(x=>x.id===contextId);if(r){if(!r.photos)r.photos=[];r.photos.push(photoId);save();}}
    else if(context==='project'){const p=(db.projects||[]).find(x=>x.id===contextId);if(p){if(!p.photos)p.photos=[];p.photos.push(photoId);save();}}
    // Add thumbnail
    const gridId=(context==='check'?'rec-photos-':context==='maint'?'maint-photos-':context==='sop'?'sop-rec-photos-':'proj-photos-')+contextId;
    const grid=document.getElementById(gridId);
    if(grid){const img=document.createElement('img');img.src=dataUrl;img.className='photo-thumb';img.onclick=()=>viewPhotoFull(dataUrl);grid.insertBefore(img,grid.firstChild);}
    toast('📷 Photo saved!');
  };
  inp.click();
}

async function loadPhotosIntoGrid(gridId,photoIds,isActive){
  const grid=document.getElementById(gridId);
  if(!grid||!photoIds||!photoIds.length)return;
  for(const pid of[...photoIds].reverse()){
    const dataUrl=await loadPhoto(pid);
    if(dataUrl){
      const img=document.createElement('img');img.src=dataUrl;img.className='photo-thumb';
      img.onclick=()=>viewPhotoFull(dataUrl);
      const addBtn=grid.querySelector('.photo-add');
      if(addBtn)grid.insertBefore(img,addBtn.nextSibling);else grid.insertBefore(img,grid.firstChild);
    }
  }
}

function viewPhotoFull(dataUrl){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
  ov.onclick=()=>ov.remove();

function generateReport(propertyId){
  const props=propertyId?db.properties.filter(p=>p.id===propertyId):db.properties;
  if(props.length===0){alert('No properties to report on.');return;}
  const logoSrc=localStorage.getItem('kmrs_logo');
  const logoHtml=logoSrc?`<img src="${logoSrc}" style="height:50px;object-fit:contain">`:`<div style="font-size:22px;font-weight:800;color:#007AFF">KMRS</div>`;
  const reportDate=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  let body='';
  props.forEach(p=>{
    const chks=db.checks.filter(c=>c.propertyId===p.id).sort((a,b)=>b.date.localeCompare(a.date));
    const mItems=db.maintenance.filter(m=>m.propertyId===p.id);
    const invs=(db.invoices||[]).filter(i=>i.property===p.name&&calcInvoiceStatus(i)!=='paid');
    const projs=(db.projects||[]).filter(pj=>pj.propertyId===p.id&&pj.status!=='completed');
    const lc=chks[0];
    const cs=checkStatus(p.id);
    body+=`
    <div style="page-break-inside:avoid;margin-bottom:40px;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden">
      <div style="background:#007AFF;color:white;padding:16px 20px">
        <h2 style="margin:0;font-size:20px">${p.name}</h2>
        ${p.address?`<p style="margin:4px 0 0;font-size:13px;opacity:0.85">${p.address}</p>`:''}
        ${p.owner?`<p style="margin:4px 0 0;font-size:13px;opacity:0.85">Owner: ${p.owner}${p.ownerPhone?' · '+p.ownerPhone:''}</p>`:''}
      </div>
      <div style="padding:16px 20px">
        <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px">
          <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:${cs==='ok'?'#34C759':cs==='never'?'#8E8E93':'#FF3B30'}">${cs==='ok'?'✓':cs==='never'?'—':'!'}</div><div style="font-size:11px;color:#666">Last Check<br>${lc?fmtDate(lc.date):'Never'}</div></div>
          <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:${mItems.filter(m=>maintStatus(m)==='overdue').length>0?'#FF3B30':'#34C759'}">${mItems.filter(m=>maintStatus(m)==='overdue').length}</div><div style="font-size:11px;color:#666">Maint<br>Overdue</div></div>
          <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:${invs.length>0?'#FF9500':'#34C759'}">${invs.length}</div><div style="font-size:11px;color:#666">Open<br>Invoices</div></div>
          <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#007AFF">${projs.length}</div><div style="font-size:11px;color:#666">Active<br>Projects</div></div>
        </div>
        ${mItems.filter(m=>['overdue','due_soon'].includes(maintStatus(m))).length>0?`
        <h4 style="margin:0 0 8px;font-size:13px;text-transform:uppercase;color:#666;letter-spacing:0.5px">⚠️ Maintenance Attention Needed</h4>
        <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
          ${mItems.filter(m=>['overdue','due_soon'].includes(maintStatus(m))).map(m=>{const cat=CATS[m.category]||CATS.general;return`<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:6px 8px">${cat.emoji} ${m.name}</td><td style="padding:6px 8px;color:#666">${propName(m.propertyId)}</td><td style="padding:6px 8px;color:${maintStatus(m)==='overdue'?'#FF3B30':'#FF9500'};text-align:right">${m.nextDue?fmtDate(m.nextDue):'—'}</td></tr>`;}).join('')}
        </table>`:''}
        ${invs.length>0?`
        <h4 style="margin:0 0 8px;font-size:13px;text-transform:uppercase;color:#666;letter-spacing:0.5px">💸 Outstanding Invoices</h4>
        <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px">
          ${invs.map(i=>`<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:6px 8px">${i.vendor}${i.invoiceNum?' #'+i.invoiceNum:''}</td><td style="padding:6px 8px;color:${calcInvoiceStatus(i)==='overdue'?'#FF3B30':'#FF9500'};text-align:right">$${Number(i.amount||0).toLocaleString()}</td><td style="padding:6px 8px;color:#666;text-align:right">${fmtDate(i.dueDate)}</td></tr>`).join('')}
          <tr><td colspan="2" style="padding:8px;font-weight:700;text-align:right">Total:</td><td style="padding:8px;font-weight:700;text-align:right">$${invs.reduce((s,i)=>s+Number(i.amount||0),0).toLocaleString()}</td></tr>
        </table>`:''}
        ${chks.length>0?`
        <h4 style="margin:0 0 8px;font-size:13px;text-transform:uppercase;color:#666;letter-spacing:0.5px">✅ Recent Checks</h4>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          ${chks.slice(0,3).map(c=>{const fl=c.flags?c.flags.length:0;return`<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:6px 8px">${fmtDate(c.date)}</td><td style="padding:6px 8px;color:${fl>0?'#FF9500':'#34C759'}">${fl>0?`⚠️ ${fl} issue${fl!==1?'s':''}`:'✅ All clear'}</td></tr>`;}).join('')}
        </table>`:''}
      </div>
    </div>`;
  });
  // Overall invoice summary
  const allInvs=(db.invoices||[]).filter(i=>calcInvoiceStatus(i)!=='paid');
  const totalDue=allInvs.reduce((s,i)=>s+Number(i.amount||0),0);
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>KMRS Report · ${reportDate}</title>
  <style>*{box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;color:#1c1c1e;margin:0;padding:0;background:white;}
  @media print{body{print-color-adjust:exact;-webkit-print-color-adjust:exact;}}</style></head>
  <body><div style="max-width:800px;margin:0 auto;padding:32px 24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:16px;border-bottom:2px solid #007AFF">
      ${logoHtml}
      <div style="text-align:right"><div style="font-size:13px;color:#666">${reportDate}</div><div style="font-size:11px;color:#999;margin-top:2px">KMRS Residential Services</div></div>
    </div>
    <h1 style="font-size:24px;margin:16px 0 4px;font-weight:700">${propertyId&&props.length===1?props[0].name+' — Property Report':'Full Portfolio Report'}</h1>
    <p style="color:#666;font-size:14px;margin:0 0 24px">${props.length} propert${props.length===1?'y':'ies'} · ${allInvs.length} open invoice${allInvs.length!==1?'s':''} · $${totalDue.toLocaleString(undefined,{minimumFractionDigits:2})} total due</p>
    ${body}
    <div style="margin-top:32px;padding-top:16px;border-top:1px solid #e0e0e0;font-size:11px;color:#999;text-align:center">Generated by KMRS Residential Services · ${reportDate}</div>
  </div>
  <script>window.onload=function(){window.print();}<\/script>
  </body></html>`;
  const win=window.open('','_blank');
  if(win){win.document.write(html);win.document.close();}
  else{alert('Please allow pop-ups to generate the report.');}
}

function openSheet(html){document.getElementById('sheetContent').innerHTML=html;document.getElementById('sheetOv').classList.add('open');document.getElementById('page').classList.add('locked');}
function closeSheet(){document.getElementById('sheetOv').classList.remove('open');document.getElementById('page').classList.remove('locked');}

function toast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:calc(60px + env(safe-area-inset-bottom,0px) + 20px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:white;padding:11px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:300;white-space:nowrap;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);animation:slideUp 0.3s ease;';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),3200);
}

═══════════════════════════════════════════════ */
function exportData(){
  const payload=JSON.stringify(db,null,2);
  const blob=new Blob([payload],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`KMRS_backup_${today()}.json`;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('📤 Backup downloaded!');
}

function importDataPrompt(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const imported=JSON.parse(ev.target.result);
        if(!Array.isArray(imported.properties))throw new Error('bad format');
        if(confirm(`Import "${file.name}"?\n\nThis will REPLACE all current data. Export first if needed.`)){
          db=Object.assign({properties:[],vendors:[],checks:[],maintenance:[],sopRecords:[],invoices:[],projects:[]},imported);
          save();nav(curTab);
          toast('📥 Data imported successfully!');
        }
      }catch(err){alert('Could not read this file. Please use a KMRS backup .json file.');}
    };
    reader.readAsText(file);
  };
  inp.click();
}

/* ═══════════════════════════════════════════════
   PWA — iPhone / Android Install Support
═══════════════════════════════════════════════ */
function setupPWA(){
  // Generate 180x180 app icon via canvas
  const c=document.createElement('canvas');c.width=180;c.height=180;
  const ctx=c.getContext('2d');
  const gr=ctx.createLinearGradient(0,0,180,180);
  gr.addColorStop(0,'#007AFF');gr.addColorStop(1,'#5856D6');
  ctx.fillStyle=gr;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(0,0,180,180,36);ctx.fill();}
  else{ctx.fillRect(0,0,180,180);}
  ctx.fillStyle='white';
  ctx.font='bold 70px -apple-system,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('KM',90,80);
  ctx.font='bold 20px -apple-system,sans-serif';
  ctx.globalAlpha=0.85;ctx.fillText('RS',90,118);ctx.globalAlpha=1;
  const iconUrl=c.toDataURL('image/png');
  // Set apple-touch-icon
  const ati=document.getElementById('apple-touch-icon');
  if(ati)ati.href=iconUrl;
  // Set manifest (works for Android/Chrome; iOS relies on meta tags)
  try{
    const mf={name:'KMRS Residential Services',short_name:'KMRS',start_url:location.href,display:'standalone',background_color:'#F2F2F7',theme_color:'#007AFF',icons:[{src:iconUrl,sizes:'180x180',type:'image/png'},{src:iconUrl,sizes:'512x512',type:'image/png'}]};
    const mblob=new Blob([JSON.stringify(mf)],{type:'application/manifest+json'});
    const mlink=document.getElementById('pwa-manifest');
    if(mlink)mlink.href=URL.createObjectURL(mblob);
  }catch(e){}
  // Register service worker for offline use (only over HTTPS)
  if('serviceWorker' in navigator && location.protocol==='https:'){
    const swCode=`
      const CACHE='kmrs-v1';
      self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.add(location.pathname||'/')));});
      self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;})));});
    `;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).then(()=>{console.log('SW registered');}).catch(()=>{});
  }
}
